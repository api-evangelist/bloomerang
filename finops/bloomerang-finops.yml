description: >-
  FinOps view of Bloomerang spend. Bloomerang is sold as a nonprofit CRM
  subscription (Bloomerang CRM, Fundraising, Volunteer, and Membership
  modules, individually or bundled), billed primarily on constituent record
  (contact) count rather than API call volume or seat count - every tier
  includes unlimited users. The REST API v2, private API keys, and webhook
  subscriptions ship as part of the CRM subscription with no separate API
  invoice line. The dominant cost driver for a nonprofit is therefore
  database size and which product modules are bundled, not integration
  traffic.
notes: >-
  Per-tier record-count boundaries and exact rates are not reconciled here;
  verify current pricing on the Bloomerang pricing page. Bloomerang does not
  meter or bill for API requests, so there is no throughput-based FinOps
  meter analogous to a usage-billed API platform.
