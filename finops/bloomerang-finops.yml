meters:
- name: constituent_records
  description: Number of constituent (contact) records tracked in the account, the primary driver of subscription tier.
  unit: records
  aggregation: max
  dimensions:
  - account
- name: module_subscriptions
  description: Which product modules (CRM, Fundraising, Volunteer, Membership) are active on the account.
  unit: subscriptions
  aggregation: count
  dimensions:
  - account
  - module
- name: api_requests
  description: REST API v2 request volume; not metered or billed by Bloomerang, tracked here for internal integration cost/observability only.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
principles:
- name: Visibility
  description: Track constituent record growth against subscription tier boundaries before it triggers an unplanned upgrade at renewal.
- name: Allocation
  description: Attribute the CRM subscription cost to development/fundraising operations; there is no per-integration or per-key cost to allocate since API access is bundled.
- name: Optimization
  description: Periodically deduplicate and archive inactive constituent records to stay within a lower record tier, and consolidate onto the bundled Giving Platform if running separate point tools.
- name: Accountability
  description: Assign an owner for the Bloomerang contract renewal and record-count review, since pricing changes are tied to database growth rather than a usage dashboard.
