aid: bloomerang
name: Bloomerang
review:
  question: Does Bloomerang expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Bloomerang's own public REST API v2
    (base https://api.bloomerang.co/v2) is request/response REST over HTTPS.
    The only server-initiated transport Bloomerang documents is outbound
    webhooks - Bloomerang POSTs an event payload, signed with an
    x-bloomerang-signature header, to a subscriber's HTTPS endpoint. That is
    a webhook (HTTP callback) pattern, not a persistent WebSocket or SSE
    stream, so there is no server-push transport on Bloomerang's own API to
    model in AsyncAPI.
findings:
  summary: |
    Bloomerang does not publish a documented public WebSocket API. Bloomerang
    is a nonprofit donor management / fundraising CRM. Its REST API v2 (base
    https://api.bloomerang.co/v2) is a private-key, server-to-server API,
    authenticated with an API key in the X-Api-Key header (generated by an
    Administrator user under User Settings) or an OAuth 2.0 Bearer token for
    third-party applications. It exposes pure request/response REST endpoints
    for Constituents, Transactions, Interactions, and related donor data, plus
    outbound webhook subscriptions for event notifications. Bloomerang also
    offers Bloomerang.js, a public-key client-side library for submitting
    donation forms, which itself makes REST calls under the hood - not
    WebSocket. No realtime, bidirectional WebSocket (ws:// or wss://) endpoint
    is documented anywhere in Bloomerang's REST API v2 or v1 documentation, the
    OAuth reference guide, or Bloomerang.js documentation as of the review
    date. Bloomerang does not offer a sandbox environment; all API access
    operates against production data.
  kindfulNote: |
    Bloomerang acquired fellow nonprofit software company Kindful in January
    2021 (not 2022). Kindful has continued to operate its own product and its
    own separate API/developer surface rather than being merged into
    Bloomerang's REST API v2. This review is scoped to Bloomerang's own API
    only; Kindful's API was out of scope and was not reviewed here.
  openApiCoverage: |
    Bloomerang does not publish a complete, versioned OpenAPI/Swagger document
    for the REST API v2. The openapi/bloomerang-openapi.yml file in this
    repository grounds the Constituents, Transactions, and Interactions paths
    directly in Bloomerang's public documentation and third-party integration
    guides (endpointsConfirmed below). Households, Notes, Relationships,
    Custom Fields, Webhooks, Users, Funds, Campaigns, and Appeals are modeled
    (endpointsModeled below) from REST API v1 resource parity, Bloomerang's
    documented data objects (e.g. the Note object's AttachmentIds property,
    the Relationship object's RelationshipRole1/RelationshipRole2/Note
    fields), and community client libraries - their exact v2 REST paths were
    not independently confirmed on an official reference page during this
    review.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.bloomerang.co/v2
      documented: true
      note: Private-key or OAuth 2.0 Bearer token authenticated request/response REST API.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Bloomerang POSTs signed event payloads (x-bloomerang-signature header) to a subscriber's HTTPS endpoint via POST /webhooks registration. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Bloomerang's REST API v2, REST API v1, OAuth reference guide, or Bloomerang.js documentation as of the review date.
  endpointsConfirmed:
    - GET  https://api.bloomerang.co/v2/constituents
    - GET  https://api.bloomerang.co/v2/constituents/{id}
    - POST https://api.bloomerang.co/v2/constituents
    - GET  https://api.bloomerang.co/v2/constituents/search
    - GET  https://api.bloomerang.co/v2/constituents/{id}/relationships
    - POST https://api.bloomerang.co/v2/transactions
    - POST https://api.bloomerang.co/v2/interactions
    - POST https://api.bloomerang.co/v2/webhooks
  endpointsModeled:
    - PATCH  https://api.bloomerang.co/v2/constituents/{id}
    - GET    https://api.bloomerang.co/v2/constituents/{id}/timeline
    - POST   https://api.bloomerang.co/v2/constituents/{id}/relationships
    - POST   https://api.bloomerang.co/v2/households
    - GET    https://api.bloomerang.co/v2/households/{id}
    - PATCH  https://api.bloomerang.co/v2/households/{id}
    - GET    https://api.bloomerang.co/v2/transactions
    - GET    https://api.bloomerang.co/v2/transactions/{id}
    - GET    https://api.bloomerang.co/v2/interactions
    - GET    https://api.bloomerang.co/v2/interactions/{id}
    - POST   https://api.bloomerang.co/v2/notes
    - GET    https://api.bloomerang.co/v2/notes/{id}
    - GET    https://api.bloomerang.co/v2/customFields/{type}
    - GET    https://api.bloomerang.co/v2/webhooks
    - DELETE https://api.bloomerang.co/v2/webhooks/{id}
    - GET    https://api.bloomerang.co/v2/users
    - GET    https://api.bloomerang.co/v2/funds
    - GET    https://api.bloomerang.co/v2/campaigns
    - GET    https://api.bloomerang.co/v2/appeals
    - "(unconfirmed path) Bloomerang Lists / saved-segment retrieval - CRM feature exists, no public v2 REST path found"
sources:
  - url: https://bloomerang.com/api
    type: Documentation
    note: Landing page for Bloomerang's API offerings (REST API, Bloomerang.js).
  - url: https://bloomerang.com/api/rest-api
    type: APIReference
    note: REST API overview - private key auth, server-to-server, transaction/designation model. Base URL and full endpoint list not published on this landing page.
  - url: https://bloomerang.com/api/rest-api-v1
    type: Documentation
    note: Legacy REST API v1, still available; used here to infer resource parity (Household, User, Fund, Campaign, Appeal, CustomField) for v2 modeling.
  - url: https://bloomerang.co/product/integrations-data-management/api/oauth-reference-guide/
    type: Documentation
    note: OAuth 2.0 reference guide for third-party application authentication.
  - url: https://bloomerang.com/api/bloomerang-js
    type: Documentation
    note: Bloomerang.js public-key client library for donation forms; REST under the hood, not WebSocket.
  - url: https://rollout.com/integration-guides/bloomerang/sdk/step-by-step-guide-to-building-a-bloomerang-api-integration-in-java
    type: Documentation
    note: Confirms base URL https://api.bloomerang.co/v2, X-API-Key header, and /constituents GET/POST/{id} paths.
  - url: https://rollout.com/integration-guides/bloomerang/quick-guide-to-implementing-webhooks-in-bloomerang
    type: Documentation
    note: Confirms POST https://api.bloomerang.co/v2/webhooks registration with url/event/active fields and x-bloomerang-signature verification.
  - url: https://rollout.com/integration-guides/bloomerang/api-essentials
    type: Documentation
    note: General API essentials - Constituents, Donations, Interactions, Transactions, Custom Fields, Campaigns, Funds, Users; notes webhooks are not part of the official documented feature set beyond the rollout-observed pattern, and no rate limits are published.
  - url: https://dlthub.com/context/source/bloomerang
    type: Documentation
    note: Third-party pipeline connector documenting v1-style Constituent/Fund/Campaign/Appeal/CustomField/User/Transaction/Email/Address endpoints and Basic Auth for v1.
  - url: https://github.com/chiperific/bloomerang_api
    type: SourceCode
    note: Unofficial Ruby REST client; confirms v2.0 API key generation via User Settings, skip/take pagination defaults, resource classes (Constituent, Campaign, CustomField, Email, Task, Fund, Transaction), and explicit note that Bloomerang offers no sandbox environment.
  - url: https://bloomerang.com/pricing
    type: Documentation
    note: Constituent-record-tiered subscription pricing across CRM, Fundraising, Volunteer, and the bundled Giving Platform; no mention of a separate API fee.
  - url: https://bloomerang.com/news/bloomerang-acquires-kindful-to-accelerate-vision-of-helping-nonprofits-fund-their-missions
    type: Documentation
    note: Confirms the Bloomerang/Kindful acquisition closed in January 2021, with Kindful continuing to operate its own product line.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Bloomerang's own API. No AsyncAPI
    document was created because Bloomerang's only server-initiated transport
    is outbound webhooks (HTTP callbacks), which are documented as a
    Webhooks logical API in apis.yml rather than modeled as AsyncAPI.
